            "Turkey": ["Istanbul (IST)", "Istanbul (SAW)", "Antalya (AYT)"],
            "Ukraine": ["Kyiv (KBP)", "Lviv (LWO)"],
            "United Arab Emirates": ["Dubai (DXB)", "Abu Dhabi (AUH)", "Sharjah (SHJ)"],
            "United Kingdom": ["London (LHR)", "London (LGW)", "Manchester (MAN)", "Edinburgh (EDI)"],
            "Vietnam": ["Ho Chi Minh City (SGN)", "Hanoi (HAN)", "Da Nang (DAD)"]
        };

        function updateCities(type) {
            const countrySelect = document.getElementById(type + '_country');
            const citySelect = document.getElementById(type + '_city');
            const selectedCountry = countrySelect.value;

            citySelect.innerHTML = '<option value="">-- Select City --</option>';

            if (selectedCountry && cityData[selectedCountry]) {
                cityData[selectedCountry].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        }

        function toggleReturn() {
            const tripType = document.querySelector('input[name="trip_type"]:checked').value;
            const returnSection = document.getElementById('return-section');
            if (returnSection) {
                returnSection.style.display = (tripType === 'round trip') ? 'block' : 'none';
            }
        }
        window.onload = toggleReturn;
    </script>
</head>
<body style="height: fit-content;">
    <div class="header">
        <h2 style="margin: 32px auto auto 20px;">SkyLine Admin</h2>
    </div>

<div class="allbody" style="display: flex;">
        <div class="nav" style="width: 200px; height: 100vh; position: fixed; top: 100px">
            <ul>
                <li class="major"><a href="{{ url_for('index') }}">&#9992; Home</a></li>
                <li class="major"><a href="#">&#9992; Tickets</a></li>
                <li class="minor"><a href="{{ url_for('addtickets') }}">Add Tickets</a></li>
                <li class="minor"><a href="{{ url_for('addpromos') }}">Add Promos</a></li>
                <li class="minor"><a href="{{ url_for('editpromos') }}">Edit Promos</a></li>
                <li class="minor"><a href="{{ url_for('archivetickets') }}">Archived Tickets</a></li>
                <li class="minor"><a href="{{ url_for('archivepromos') }}">Archived Tickets</a></li>                     
                <li class="major"><a href="#">&#9992; Booking</a></li>
                <li class="minor"><a href="{{ url_for('managebook') }}">Manage Bookings</a></li>
                <li class="minor"><a href="{{ url_for('archivebook') }}">Archived Bookings</a></li>
                <li class="major"><a href="#">&#9992; Users</a></li>
                <li class="minor"><a href="{{ url_for('manageuser') }}">Manage Users</a></li>
                <li class="major"><a href="{{ url_for('logs') }}">&#9992; Logs</a></li>
            </ul>
        </div>

        <div class="main-content" style="margin-left: 220px; padding: 20px; width: 100%;">
            <div class="form-container">
                <form action="{{ url_for('edittickets', flight_id=flight.id) }}" method="POST">
                    <h2 style="color: #004d4d;">Update Flight Ticket #{{ flight.id }}</h2>

                    <div class="form-section">
                        <h3>Flight Type</h3>
                        <div class="radio-group">
                            <input type="radio" name="trip_type" value="one way trip" id="oneway" onclick="toggleReturn()" {% if flight.trip_type == 'one way trip' %}checked{% endif %}>
                            <label for="oneway">One Way</label>
                            <input type="radio" name="trip_type" value="round trip" id="roundtrip" onclick="toggleReturn()" {% if flight.trip_type == 'round trip' %}checked{% endif %}>
                            <label for="roundtrip">Round Trip</label>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>From Country (Currently: {{ flight.from_country }})</label>
                            <select name="from_country" id="from_country" onchange="updateCities('from')" required>
                                <option value="">-- Select Country --</option>
                                {% for country in countries %}
                                <option value="{{ country }}" {% if flight.from_country == country %}selected{% endif %}>{{ country }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>From City</label>
                            <select name="from_city" id="from_city" required>
                                <option value="{{ flight.from_city }}">{{ flight.from_city }}</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>To Country (Currently: {{ flight.to_country }})</label>
                            <select name="to_country" id="to_country" onchange="updateCities('to')" required>
                                <option value="">-- Select Country --</option>
                                {% for country in ["Afghanistan", "Australia", "Japan", "Philippines", "United States"] %}
                                <option value="{{ country }}" {% if flight.to_country == country %}selected{% endif %}>{{ country }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>To City</label>
                            <select name="to_city" id="to_city" required>
                                <option value="{{ flight.to_city }}">{{ flight.to_city }}</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Departure Date</label>
                            <input type="date" name="dep_date" value="{{ flight.dep_date }}" required>
                        </div>
                        <div class="form-group">
                            <label>Departure Time</label>
                            <input type="time" name="dep_time" value="{{ flight.dep_time }}" required>
                        </div>
                    </div>

                    <div id="return-section" style="display: {{ 'block' if flight.trip_type == 'round trip' else 'none' }};">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Return Date</label>
                                <input type="date" name="ret_date" value="{{ flight.ret_date }}">
                            </div>
                            <div class="form-group">
                                <label>Return Time</label>
                                <input type="time" name="ret_time" value="{{ flight.ret_time }}">
                            </div>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Economy Class Tickets</label>
                            <input type="number" name="tickets_economy" value="{{ flight.tickets_economy }}" min="0" required>
                        </div>
                        <div class="form-group">
                            <label>Business Class Tickets</label>
                            <input type="number" name="tickets_business" value="{{ flight.tickets_business }}" min="0" required>
                        </div>
                        <div class="form-group">
                            <label>First Class Tickets</label>
                            <input type="number" name="tickets_first" value="{{ flight.tickets_first }}" min="0" required>
                        </div>
                        <div class="form-group">
                            <label>Base Price (PHP)</label>
                            <input type="number" step="0.01" name="price" value="{{ flight.price }}" required>
                        </div>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button type="submit" class="submit-btn" style="flex: 2;">UPDATE FLIGHT TICKET</button>
                        <a href="{{ url_for('admin_dashboard') }}" class="submit-btn" style="flex: 1; background: #666; text-align: center; text-decoration: none;">CANCEL</a>
                    </div>
                </form>
            </div>
        </div>
</div>
</body>
</html>
